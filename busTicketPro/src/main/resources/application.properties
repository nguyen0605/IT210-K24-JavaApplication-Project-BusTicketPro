spring.application.name=Bus Ticket Pro
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bus_ticket_pro}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Bangkok
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:0605}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Bangkok
spring.thymeleaf.cache=false
logging.level.org.springframework.security=INFO
server.error.whitelabel.enabled=false

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.scheduler.ticket-maintenance-delay-ms=${TICKET_MAINTENANCE_DELAY_MS:600000}
app.scheduler.ticket-maintenance-initial-delay-ms=${TICKET_MAINTENANCE_INITIAL_DELAY_MS:30000}
