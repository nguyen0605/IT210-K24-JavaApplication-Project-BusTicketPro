<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title th:text="${pageTitle}">Bus Ticket Pro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#00357f",
                        "primary-container": "#004aad",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#a9c1ff",
                        "primary-fixed": "#d9e2ff",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-primary-fixed": "#001945",
                        "on-primary-fixed-variant": "#00429b",
                        secondary: "#8b5000",
                        "secondary-container": "#ff9800",
                        "on-secondary-container": "#653900",
                        background: "#f6faff",
                        surface: "#f6faff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#ecf5fe",
                        "surface-container": "#e6eff8",
                        "surface-container-high": "#e0e9f2",
                        "surface-container-highest": "#dbe4ed",
                        "surface-variant": "#dbe4ed",
                        "on-surface": "#141d23",
                        "on-background": "#141d23",
                        "on-surface-variant": "#434653",
                        outline: "#737784",
                        "outline-variant": "#c3c6d5",
                        error: "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "tertiary-fixed": "#83fc8e",
                        "on-tertiary-fixed": "#002106"
                    },
                    borderRadius: {lg: "0.5rem", xl: "0.75rem", full: "9999px"},
                    spacing: {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "24px",
                        gutter: "24px",
                        "margin-mobile": "16px",
                        "margin-desktop": "48px"
                    },
                    fontFamily: {
                        sans: ["Be Vietnam Pro", "sans-serif"],
                        "body-md": ["Be Vietnam Pro"],
                        "body-sm": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "headline-sm": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Be Vietnam Pro"],
                        "display-lg": ["Be Vietnam Pro"]
                    },
                    fontSize: {
                        "body-sm": ["14px", {lineHeight: "20px", fontWeight: "400"}],
                        "body-md": ["16px", {lineHeight: "24px", fontWeight: "400"}],
                        "body-lg": ["18px", {lineHeight: "28px", fontWeight: "400"}],
                        "label-sm": ["12px", {lineHeight: "16px", fontWeight: "500"}],
                        "label-md": ["14px", {lineHeight: "16px", fontWeight: "600"}],
                        "headline-sm": ["20px", {lineHeight: "28px", fontWeight: "600"}],
                        "headline-md": ["24px", {lineHeight: "32px", fontWeight: "600"}],
                        "headline-lg": ["32px", {lineHeight: "40px", fontWeight: "700"}],
                        "display-lg": ["40px", {lineHeight: "48px", fontWeight: "700"}]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
        .hero-gradient { background: linear-gradient(135deg, rgba(0, 53, 127, .95) 0%, rgba(0, 74, 173, .8) 100%); }
    </style>
</head>
<body>
<header th:fragment="nav(active)" class="fixed top-0 w-full h-[72px] z-50 bg-surface shadow-sm">
    <div class="max-w-[1200px] mx-auto h-full flex items-center justify-between px-margin-mobile md:px-margin-desktop">
        <div class="flex items-center gap-stack-lg">
            <a class="text-headline-md font-bold text-primary" th:href="@{/}">Bus Ticket Pro</a>
            <nav class="hidden md:flex items-center gap-stack-lg">
                <a th:href="@{/}" th:class="${active == 'home'} ? 'font-label-md text-label-md text-primary border-b-2 border-primary pb-1 font-semibold' : 'font-label-md text-label-md text-on-surface-variant font-medium hover:text-primary transition-colors'">Trang chủ</a>
                <a th:href="@{/trips/search}" th:class="${active == 'trips'} ? 'font-label-md text-label-md text-primary border-b-2 border-primary pb-1 font-semibold' : 'font-label-md text-label-md text-on-surface-variant font-medium hover:text-primary transition-colors'">Tra cứu chuyến xe</a>
                <a th:href="@{/tickets/lookup}" th:class="${active == 'tickets'} ? 'font-label-md text-label-md text-primary border-b-2 border-primary pb-1 font-semibold' : 'font-label-md text-label-md text-on-surface-variant font-medium hover:text-primary transition-colors'">Tra cứu vé</a>
                <a sec:authorize="isAuthenticated()" th:href="@{/tickets/my}" th:class="${active == 'my-tickets'} ? 'font-label-md text-label-md text-primary border-b-2 border-primary pb-1 font-semibold' : 'font-label-md text-label-md text-on-surface-variant font-medium hover:text-primary transition-colors'">Vé của tôi</a>
            </nav>
        </div>
        <div class="flex items-center gap-stack-md">
            <a sec:authorize="isAnonymous()" th:href="@{/register}" class="hidden md:block font-label-md text-label-md text-primary font-semibold hover:text-on-primary-fixed-variant transition-colors">Đăng ký</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}" class="bg-primary text-on-primary px-stack-lg py-2 rounded-lg font-label-md text-label-md font-semibold active:scale-95 transition-transform">Đăng nhập</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/profile}" class="font-label-md text-label-md text-primary font-semibold">Hồ sơ</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="bg-primary text-on-primary px-stack-lg py-2 rounded-lg font-label-md text-label-md font-semibold" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</header>

<div th:fragment="messages" th:if="${success != null or error != null}" class="fixed top-[88px] right-4 z-[100] w-[min(360px,calc(100vw-32px))] space-y-2">
    <style>
        .app-toast { animation: app-toast-out 0.25s ease-in forwards; animation-delay: 2s; }
        @keyframes app-toast-out { to { opacity: 0; transform: translateX(16px); visibility: hidden; } }
    </style>
    <div th:if="${success}" class="app-toast rounded-lg border border-[#8bbf91] bg-[#eaf7ed] px-4 py-3 text-[#185321] font-body-sm shadow-lg" th:text="${success}"></div>
    <div th:if="${error}" class="app-toast rounded-lg border border-error bg-error-container px-4 py-3 text-on-error-container font-body-sm shadow-lg" th:text="${error}"></div>
</div>

<footer th:fragment="footer" class="bg-surface-container-high">
    <div class="max-w-[1200px] mx-auto py-stack-lg px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between gap-gutter border-t border-outline-variant/30">
        <div class="md:w-1/3">
            <div class="text-headline-sm font-bold text-primary mb-2">Bus Ticket Pro</div>
            <p class="font-body-md text-body-md text-on-surface-variant">© 2026 Bus Ticket Pro. Nền tảng đặt vé xe khách liên tỉnh hàng đầu Việt Nam.</p>
        </div>
        <div class="grid grid-cols-2 gap-stack-lg">
            <div class="flex flex-col gap-2">
                <span class="font-label-md text-label-md text-on-surface font-bold mb-1">Công ty</span>
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Về chúng tôi</a>
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Liên hệ</a>
            </div>
            <div class="flex flex-col gap-2">
                <span class="font-label-md text-label-md text-on-surface font-bold mb-1">Chính sách</span>
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Điều khoản sử dụng</a>
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary" href="#">Chính sách bảo mật</a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
