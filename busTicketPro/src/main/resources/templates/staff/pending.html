<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/staff-ui :: head('Vé chờ thanh toán')}"></head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<header th:replace="~{fragments/staff-ui :: nav('pending')}"></header>
<div th:replace="~{fragments/staff-ui :: messages}"></div>
<main class="flex-grow max-w-[1200px] mx-auto px-margin-mobile md:px-margin-desktop py-stack-lg w-full">
    <div class="mb-stack-lg">
        <h1 class="font-headline-lg text-headline-lg text-primary mb-2">Vé chờ thanh toán</h1>
        <p class="font-body-md text-body-md text-on-surface-variant">Quản lý và xử lý các giao dịch đặt vé đang tạm giữ.</p>
    </div>

    <section class="bg-surface-container-lowest p-stack-lg rounded-xl shadow-sm border border-outline-variant mb-stack-lg">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-stack-md">
            <div class="flex flex-col gap-1">
                <label class="font-label-md text-label-md text-on-surface">Mã vé</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">confirmation_number</span>
                    <input class="w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-2 focus:ring-primary/20 focus:border-primary" placeholder="Nhập mã vé..." type="text">
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-label-md text-label-md text-on-surface">Số điện thoại</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">call</span>
                    <input class="w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-2 focus:ring-primary/20 focus:border-primary" placeholder="Nhập SĐT khách..." type="tel">
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-label-md text-label-md text-on-surface">Tuyến đường</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">route</span>
                    <select class="w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg font-body-sm text-body-sm focus:ring-2 focus:ring-primary/20 focus:border-primary">
                        <option>Tất cả các tuyến</option>
                    </select>
                </div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-label-md text-label-md text-on-surface">Trạng thái</label>
                <select class="w-full px-3 py-2 border border-outline-variant rounded-lg font-body-sm text-body-sm" disabled>
                    <option>Chờ thanh toán</option>
                </select>
            </div>
        </div>
        <div class="flex justify-end mt-stack-md gap-stack-md">
            <a th:href="@{/staff/tickets/pending}" class="px-stack-md py-2 border border-outline text-primary font-label-md rounded-lg hover:bg-surface-container">Làm mới</a>
            <button class="px-stack-lg py-2 bg-primary text-on-primary font-label-md rounded-lg shadow-sm hover:opacity-90 flex items-center gap-2" type="button">
                <span class="material-symbols-outlined text-[18px]">search</span> Tìm kiếm
            </button>
        </div>
    </section>

    <section class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[960px]">
                <thead class="bg-surface-container text-on-surface-variant">
                <tr>
                    <th class="px-stack-md py-4 font-label-md text-label-md">Mã vé</th>
                    <th class="px-stack-md py-4 font-label-md text-label-md">Khách hàng</th>
                    <th class="px-stack-md py-4 font-label-md text-label-md">Tuyến đường</th>
                    <th class="px-stack-md py-4 font-label-md text-label-md">Ghế</th>
                    <th class="px-stack-md py-4 font-label-md text-label-md">Giờ đặt</th>
                    <th class="px-stack-md py-4 font-label-md text-label-md">Hạn thanh toán</th>
                    <th class="px-stack-md py-4 font-label-md text-label-md text-right">Tổng tiền</th>
                    <th class="px-stack-md py-4 font-label-md text-label-md text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-outline-variant">
                <tr th:each="t : ${tickets}" class="hover:bg-surface-container-low transition-colors">
                    <td class="px-stack-md py-4"><a class="font-body-sm text-primary font-bold" th:href="@{/staff/tickets/{id}(id=${t.id})}" th:text="${t.ticketCode}">BTP</a></td>
                    <td class="px-stack-md py-4">
                        <div class="flex flex-col"><span class="font-label-md text-on-surface" th:text="${t.passengerName}">Khách</span><span class="text-body-sm text-on-surface-variant" th:text="${t.passengerPhone}">090</span></div>
                    </td>
                    <td class="px-stack-md py-4 text-body-sm"><span th:text="${t.trip.route.departure.name}">SG</span> <span class="material-symbols-outlined text-[14px]">arrow_forward</span> <span th:text="${t.trip.route.arrival.name}">DL</span></td>
                    <td class="px-stack-md py-4 font-body-sm" th:text="${t.seat.seatNumber}">A01</td>
                    <td class="px-stack-md py-4 font-body-sm text-on-surface-variant" th:text="${#temporals.format(t.bookingTime,'HH:mm dd/MM')}">14:30</td>
                    <td class="px-stack-md py-4 font-body-sm text-error font-medium" th:text="${#temporals.format(t.expiredTime,'HH:mm dd/MM')}">15:30</td>
                    <td class="px-stack-md py-4 font-label-md text-secondary text-right" th:text="${#numbers.formatDecimal(t.totalAmount,0,'COMMA',0,'POINT')} + 'đ'">0đ</td>
                    <td class="px-stack-md py-4">
                        <div class="flex items-center justify-center gap-2">
                            <a th:href="@{/staff/tickets/{id}(id=${t.id})}" class="material-symbols-outlined p-2 text-primary hover:bg-primary/10 rounded-full" title="Xem chi tiết">visibility</a>
                            <form th:action="@{/staff/tickets/{id}/confirm(id=${t.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="material-symbols-outlined p-2 text-tertiary hover:bg-tertiary-fixed rounded-full" title="Xác nhận thanh toán">check_circle</button>
                            </form>
                            <form th:action="@{/staff/tickets/{id}/cancel(id=${t.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="reason" value="STAFF_CANCELLED">
                                <button class="material-symbols-outlined p-2 text-error hover:bg-error-container rounded-full" title="Hủy vé">cancel</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tickets)}"><td colspan="8" class="px-stack-lg py-stack-lg text-center text-on-surface-variant">Không có vé chờ thanh toán.</td></tr>
                </tbody>
            </table>
        </div>
        <div class="px-stack-md py-4 border-t border-outline-variant flex flex-col md:flex-row justify-between items-center gap-stack-md">
            <span class="text-body-sm text-on-surface-variant" th:text="'Hiển thị ' + ${#lists.size(tickets)} + ' vé chờ thanh toán'">Hiển thị 0 vé</span>
            <div class="flex items-center gap-2"><button class="w-10 h-10 rounded-lg bg-primary text-on-primary font-label-md">1</button></div>
        </div>
    </section>
</main>
<footer th:replace="~{fragments/staff-ui :: footer}"></footer>
</body>
</html>
